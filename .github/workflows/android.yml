name: Build Android APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Create Configuration Environment File
      run: touch .env

    - name: Generate Debug Keystore
      run: |
        if [ -f debug.keystore.base64 ]; then
          echo "Decoding existing base64-encoded debug.keystore..."
          base64 -d debug.keystore.base64 > debug.keystore
        else
          echo "Generating a new standard debug keystore for compilation..."
          keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
        fi

    - name: Fix Line Endings in Gradlew
      run: |
        find . -name "gradlew" -exec sed -i 's/\r$//' {} + || true

    - name: Grant Execute Permissions to Gradlew
      run: find . -name "gradlew" -exec chmod +x {} + || true

    - name: Build Debug APK
      run: |
        if [ -f "gradlew" ]; then
          ./gradlew assembleDebug --no-daemon
        else
          gradle assembleDebug --no-daemon
        fi

    - name: Upload Compiled APK Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Calculator-App-${{ github.run_number }}
        path: '**/*.apk'
        overwrite: true
