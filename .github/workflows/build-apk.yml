name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Create Empty Env File
      run: touch .env

    - name: Generate dummy debug keystore
      run: |
        if [ -f debug.keystore.base64 ]; then
          echo "Decoding existing debug.keystore.base64..."
          base64 -d debug.keystore.base64 > debug.keystore
        else
          echo "Generating a new standard debug keystore..."
          keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
        fi

    - name: Fix Line Endings in Gradlew
      run: |
        find . -name "gradlew" -exec sed -i 's/\r$//' {} + || true

    - name: Find and setup gradlew
      run: find . -name "gradlew" -exec chmod +x {} + || true

    - name: Build Debug APK
      run: |
        if [ -f "gradlew" ]; then
          ./gradlew assembleDebug --no-daemon
        elif [ -d "android" ] && [ -f "android/gradlew" ]; then
          cd android && ./gradlew assembleDebug --no-daemon
        else
          gradle assembleDebug --no-daemon
        fi

    - name: Upload all APKs
      uses: actions/upload-artifact@v4
      with:
        name: my-android-app-${{ github.run_number }}
        path: '**/*.apk'
        overwrite: true

